[build]
  command = "python3 scripts/build.py"
  publish = "dist"

[build.environment]
  # This is a browser API key and must be present in the published JavaScript.
  # Security comes from Google Cloud HTTP-referrer and API restrictions.
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_MAPS_API_KEY,TURNSTILE_SITE_KEY"

[[redirects]]
  from = "/arepas"
  to = "/#arepas"
  status = 200

[[redirects]]
  from = "/empanadas"
  to = "/#empanadas"
  status = 200

[[redirects]]
  from = "/proteinas"
  to = "/#proteinas"
  status = 200

[[redirects]]
  from = "/teas"
  to = "/#tes"
  status = 200

[[redirects]]
  from = "/about"
  to = "/#nosotros"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/#contacto"
  status = 200
